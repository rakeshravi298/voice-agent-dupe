<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diet Assistant | Gemini Live</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2D3436;
            --accent: #00B894;
            --bg: #F0F2F5;
            --card: #FFFFFF;
            --text-secondary: #636E72;
            --google-blue: #4285f4;
            --google-red: #db4437;
            --google-yellow: #f4b400;
            --google-green: #0f9d58;
        }

        body {
            font-family: 'Outfit', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #nav-bar {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            z-index: 1000;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--accent);
        }

        #user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #user-email {
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        #logoutBtn {
            background: transparent;
            border: 1px solid #DFE6E9;
            padding: 6px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        #logoutBtn:hover {
            background: #FAFAFA;
            border-color: #B2BEC3;
        }

        #main-layout {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }

        #output-container {
            flex: 1;
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.03);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        #chatContainer {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .controls-panel {
            width: 320px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            background: var(--card);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 12px rgba(0, 184, 148, 0.2);
        }

        .btn-primary:disabled {
            background: #B2BEC3;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        .btn-stop {
            background: #FF7675;
            color: white;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            background: #F0F2F5;
            border-radius: 100px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 15px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #B2BEC3;
        }

        .status-dot.active {
            background: #00B894;
            box-shadow: 0 0 10px #00B894;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }

            100% {
                opacity: 1;
            }
        }

        /* Message Styles from successful implementation */
        #chatContainer div {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 12px;
            max-width: 90%;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .user-transcript {
            background-color: #FFF9C4;
            color: #5D4037;
            font-style: italic;
            border-left: 4px solid var(--google-yellow);
        }

        .user {
            background-color: #E8F5E9;
            color: #1B5E20;
            margin-left: auto;
            border-right: 4px solid var(--google-green);
        }

        .assistant {
            background-color: #E3F2FD;
            color: #0D47A1;
            border-left: 4px solid var(--google-blue);
        }

        .system {
            background-color: #FFEBEE;
            color: #B71C1C;
            text-align: center;
            max-width: 100% !important;
            font-size: 0.85rem;
            border-top: 1px solid var(--google-red);
        }

        #auth-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 5px solid var(--accent);
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #debugInfo {
            font-family: monospace;
            font-size: 0.75rem;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            max-height: 100px;
            overflow-y: auto;
            border: 1px solid #eee;
            margin-top: 10px;
        }

        video {
            width: 100%;
            border-radius: 12px;
            margin-top: 10px;
            background: #000;
        }
    </style>
</head>

<body>
    <div id="auth-overlay">
        <span class="loader"></span>
        <p>Verifying session...</p>
    </div>

    <nav id="nav-bar">
        <div class="brand">
            <span>🥗</span>
            Diet Assistant
        </div>
        <div id="user-profile">
            <span id="user-email"></span>
            <button id="logoutBtn">Logout</button>
        </div>
    </nav>

    <div id="main-layout">
        <div id="output-container">
            <div id="chatContainer">
                <div class="system">Connect to Gemini to start your personalized nutrition session.</div>
            </div>

            <div style="padding: 15px; background: #fff; border-top: 1px solid #eee; display: flex; gap: 10px;">
                <input type="text" id="chatInput" placeholder="Type a message..."
                    style="flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ddd; outline: none;">
                <button id="sendBtn" class="btn btn-primary" style="width: auto; padding: 0 20px;">Send</button>
            </div>
        </div>

        <div class="controls-panel">
            <div class="card">
                <div class="status-badge">
                    <div class="status-dot" id="status-dot"></div>
                    <span id="connectionStatus">Disconnected</span>
                </div>

                <div style="display: grid; gap: 10px;">
                    <button id="connectBtn" class="btn btn-primary">Connect to Gemini</button>
                    <button id="disconnectBtn" class="btn btn-stop" style="display: none;">Disconnect</button>

                    <div id="mediaControls" style="display: none; grid-gap: 10px;">
                        <button id="startAudioBtn" class="btn" style="background: #E8F5E9; color: #2E7D32;">🎤 Start
                            Audio</button>
                        <button id="startVideoBtn" class="btn" style="background: #E3F2FD; color: #1565C0;">📷 Start
                            Video</button>
                    </div>
                </div>

                <div id="debugInfo">Initializing...</div>
            </div>

            <div class="card">
                <video id="videoPreview" autoplay playsinline muted hidden></video>
                <div style="margin-top: 10px;">
                    <label style="font-size: 0.8rem; color: var(--text-secondary);">Output Volume</label>
                    <input type="range" id="volume" min="0" max="100" value="80" style="width: 100%;">
                    <div id="volumeValue" style="text-align: right; font-size: 0.75rem;">80%</div>
                </div>
            </div>

            <!-- Hidden inputs to satisfy script.js requirements -->
            <div style="display: none;">
                <input id="projectId" value="">
                <input id="model" value="gemini-live-2.5-flash-native-audio">
                <input id="proxyUrl" value="ws://localhost:8080">
                <textarea id="systemInstructions">
                    SYSTEM ROLE: DIETICIAN FOLLOW-UP ASSISTANT AGENT

                    You are an AI assistant designed to support licensed dieticians or nutritionists by communicating with their clients. You should be using thr language that the user is speaking.
                    You have to properly switch and detect and start speaking in the same language as the user.

                    Your role is to:
                    - Follow up with clients
                    - Monitor adherence to their diet plan
                    - Collect feedback
                    - Explain nutrition concepts
                    - Provide light educational guidance
                    - Log responses and observations
                    - Summarize conversations for the dietician

                    You must NOT diagnose medical conditions or replace the dietician's professional decisions.

                    You are a supportive assistant, not the dietician.

                    PRIMARY RESPONSIBILITIES

                    1. DAILY FOLLOW UPS

                    Regularly check in with the client and have a natural conversation about their day.

                    Examples of questions you may ask:
                    - How did your meals go today?
                    - Did you follow your diet schedule today?
                    - What did you have for breakfast, lunch, or dinner?
                    - Did you have any snacks today?
                    - Did you complete your recommended activity or exercise?
                    - How are you feeling today (energy levels, hunger, cravings)?

                    Keep the conversation friendly, natural, and supportive.


                    2. CLIENT-SPECIFIC CONTEXT

                    Use the client's stored information and diet plan from the knowledge base.

                    Personalize conversations based on:
                    - Assigned diet plan
                    - Previous responses
                    - Adherence history
                    - Previous concerns
                    - Dietician notes


                    3. RECORD AND LOG RESPONSES

                    Every response from the client must be recorded.

                    Log the following information:

                    - Meals eaten
                    - Snacks
                    - Exercise or activity
                    - Mood, hunger, cravings, or energy levels
                    - Questions asked
                    - Requests for diet changes
                    - Images or videos uploaded
                    - Any off-plan foods
                    - Any concerns or symptoms

                    These logs must be stored so the dietician can review them later.


                    4. EDUCATIONAL NUTRITION SUPPORT

                    You are allowed to explain nutrition and foods in an educational way.

                    You may explain:
                    - Calories
                    - Macronutrients (protein, carbohydrates, fats)
                    - Fiber
                    - Hydration
                    - Nutritional value of foods
                    - General digestion concepts
                    - Common dietary properties of foods

                    These explanations should be informative and helpful but must NOT turn into medical advice or prescriptions.


                    EDUCATIONAL COMPARISON RULE

                    If a client asks about foods or substitutions, you may explain the differences between the foods.

                    You may compare foods using information such as:

                    - Calories
                    - Protein
                    - Fat
                    - Carbohydrates
                    - Fiber
                    - Common allergens
                    - General dietary uses

                    You should NOT decide which one the client should eat.

                    Instead explain the differences and note the question for the dietician.

                    Example style:

                    Client: "Can I replace paneer with tofu?"

                    Response style:
                    Paneer and tofu are both good sources of protein but they are made differently. Paneer is a dairy product made from milk and tends to have more fat and calories. Tofu is made from soybeans and usually contains less fat while still providing good protein. Paneer may not work well for people with lactose intolerance, while tofu may not be suitable for people with soy allergies. Both can fit into balanced diets depending on the overall nutrition plan. I’ll note your question so your dietician can confirm what works best for your plan.


                    GENERAL HEALTH BALANCING GUIDANCE

                    You are allowed to give light, general wellness guidance when clients report foods they ate.

                    This guidance should be:
                    - Supportive
                    - Non-judgmental
                    - General healthy habits
                    - Not strict instructions
                    - Not changes to the doctor's diet plan

                    You may suggest simple balancing behaviors such as:

                    - Drinking more water
                    - Including vegetables in later meals
                    - Balancing heavy meals with lighter foods later
                    - Eating fiber or protein to balance energy
                    - Maintaining consistent meal timing
                    - Being mindful of portion sizes

                    You must NOT:
                    - Change the diet plan
                    - Prescribe specific replacements
                    - Suggest calorie targets
                    - Override the dietician's instructions


                    HANDLING SNACKS OR OFF PLAN FOODS

                    If a client reports foods like chips, sweets, fried foods, or heavy meals:

                    1. Do not criticize the client.
                    2. Respond in a supportive tone.
                    3. Acknowledge that occasional treats happen.
                    4. Suggest simple balancing habits like hydration or vegetables.
                    5. Log the meal for the dietician.

                    Example:

                    Client: "I had chips in the evening."

                    Response:
                    Thanks for sharing that. Chips are usually higher in salt and fats, so drinking some extra water today can help balance the sodium. Occasional snacks happen, so no worries. I’ll log this for your dietician as well.


                    IMAGE HANDLING

                    If a client uploads an image such as:
                    - Meal photos
                    - Body progress pictures
                    - Grocery items
                    - Packaged foods
                    - Food labels

                    You should:

                    1. Describe what you see
                    2. Log the image
                    3. Store the image and description for the dietician

                    Example:
                    "I see a plate with rice, vegetables, and grilled chicken. I'll log this as your meal so your dietician can review it."

                    Do not judge the food or criticize the meal.


                    VIDEO INTERACTION

                    If video is supported and the client appears:

                    - Recognize the client
                    - Address them by name
                    - Maintain a friendly tone

                    Example:
                    "Hi Rahul, good to see you. How did your meals go today?"


                    ESCALATION RULES

                    If the client:

                    - Requests diet changes
                    - Wants calorie adjustments
                    - Asks for medical advice
                    - Mentions symptoms or health issues
                    - Requests supplements
                    - Asks for major meal replacements

                    You must not make the decision.

                    Respond politely:

                    "I'll note that down and inform your dietician so they can guide you properly."

                    Log this as:
                    ALERT FOR DIETICIAN


                    STRICT RESTRICTIONS

                    You must NEVER:

                    - Diagnose diseases
                    - Prescribe diets
                    - Recommend supplements
                    - Override the dietician's plan
                    - Provide medical treatment advice


                    CONVERSATION STYLE

                    Your responses must feel natural and human.

                    Use supportive language such as:

                    - "Thanks for sharing."
                    - "Got it."
                    - "Nice job keeping track."
                    - "That's helpful to know."

                    You may ask follow-up questions to continue the conversation.

                    Avoid sounding robotic or overly formal.


                    MANDATORY SUMMARY GENERATION

                    At the end of each interaction or conversation, generate an internal structured summary for the dietician.

                    The summary must include:

                    Client Name
                    Date and Time

                    Diet Adherence
                    Breakfast followed: Yes / No / Unknown
                    Lunch followed: Yes / No / Unknown
                    Dinner followed: Yes / No / Unknown

                    Meals Reported

                    Snacks

                    Exercise or Activity

                    Mood / Energy Feedback

                    Images Uploaded

                    Client Questions

                    Requests for Diet Changes

                    Alerts for Dietician

                    The summary should be factual and concise.

                    Do not include motivational language in the summary.


                    DATA RECORDING PROCESS

                    Every client message should follow three steps:

                    Step 1: Respond naturally and supportively.

                    Step 2: Log important information:
                    - meals
                    - snacks
                    - mood
                    - exercise
                    - questions
                    - diet change requests

                    Step 3: Update the daily summary for the dietician.


                    BEHAVIORAL GOAL

                    Your purpose is to:

                    - Help clients stay accountable
                    - Encourage healthy habits
                    - Maintain natural conversations
                    - Provide helpful nutrition education
                    - Record daily progress
                    - Support the dietician with clear summaries

                    You are NOT a replacement for the dietician.

                    All final dietary decisions must be made by the dietician.
                    
                </textarea>
                <input type="checkbox" id="enableInputTranscription" checked>
                <input type="checkbox" id="enableOutputTranscription" checked>
                <input type="checkbox" id="enableGrounding">
                <input type="checkbox" id="enableAffectiveDialog" checked>
                <input type="checkbox" id="enableAlertTool">
                <input type="checkbox" id="enableCssStyleTool">
                <input type="checkbox" id="enableProactiveAudio" checked>
                <select id="voiceSelect">
                    <option value="Aoede">Aoede</option>
                </select>
                <input type="range" id="temperature" min="0.1" max="2.0" step="0.1" value="1.0">
                <span id="temperatureValue">1.0</span>
                <input type="checkbox" id="disableActivityDetection">
                <input type="number" id="silenceDuration" value="2000">
                <input type="number" id="prefixPadding" value="500">
                <select id="endSpeechSensitivity">
                    <option value="END_SENSITIVITY_UNSPECIFIED">Default</option>
                </select>
                <select id="startSpeechSensitivity">
                    <option value="START_SENSITIVITY_UNSPECIFIED">Default</option>
                </select>
                <select id="activityHandling">
                    <option value="ACTIVITY_HANDLING_UNSPECIFIED">Default</option>
                </select>
                <select id="micSelect">
                    <option value="">Default</option>
                </select>
                <select id="cameraSelect">
                    <option value="">Default</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        // CONFIG_PLACEHOLDER

        const firebaseApp = initializeApp(firebaseConfig);
        const auth = getAuth(firebaseApp);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('user-email').textContent = user.email;
                document.getElementById('projectId').value = firebaseConfig.projectId;
            } else {
                window.location.href = '/login';
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
    </script>

    <!-- Core Logic (Successful Direct Proxy Logic) -->
    <script src="/static/geminilive.js"></script>
    <script src="/static/mediaUtils.js"></script>
    <script src="/static/tools.js"></script>
    <script src="/static/script.js"></script>

    <script>
        // Use the injected Firebase config if needed for other features
        window.addEventListener('DOMContentLoaded', () => {
            console.log("Firebase config loaded:", typeof firebaseConfig !== 'undefined');
        });
    </script>
</body>

</html>


</html>
