<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Diet Assistant | Secure Access</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2D3436;
            --accent: #00B894;
            --bg: #F9FAFB;
            --card: #FFFFFF;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 450px;
            width: 90%;
            padding: 40px;
            background: var(--card);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: var(--accent);
            font-weight: 600;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            font-weight: 600;
        }

        p {
            line-height: 1.6;
            color: #636E72;
            margin-bottom: 2rem;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .input-group {
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #DFE6E9;
            box-sizing: border-box;
            font-family: inherit;
        }

        .login-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0, 184, 148, 0.3);
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 184, 148, 0.4);
            background: #00A383;
        }

        .divider {
            margin: 20px 0;
            display: flex;
            align-items: center;
            color: #B2BEC3;
            font-size: 0.8rem;
        }

        .divider::before,
        .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #DFE6E9;
        }

        .divider span {
            padding: 0 10px;
        }

        .toggle-auth {
            font-size: 0.9rem;
            color: var(--accent);
            cursor: pointer;
            background: none;
            border: none;
            font-weight: 600;
            margin-top: 10px;
        }

        .footer {
            margin-top: 2rem;
            font-size: 0.85rem;
            color: #B2BEC3;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">🥗</div>
        <h1 id="auth-title">Login</h1>
        <p id="auth-subtitle">Welcome back! Please enter your details.</p>

        <div class="auth-form">
            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="input-field" placeholder="you@example.com">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="input-field" placeholder="••••••••">
            </div>
            <button class="login-btn" id="submitBtn">Login</button>
        </div>

        <button class="toggle-auth" id="toggleAuthBtn">Don't have an account? Sign up</button>

        <div class="footer">
            Securely powered by Vertex AI & Cloud Firestore
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

        // CONFIG_PLACEHOLDER
        console.log("Login page initialized with Firebase Config:", firebaseConfig);

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let isLogin = true;

        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');
        const toggleAuthBtn = document.getElementById('toggleAuthBtn');
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');

        toggleAuthBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            authTitle.textContent = isLogin ? 'Login' : 'Sign Up';
            authSubtitle.textContent = isLogin ? 'Welcome back! Please enter your details.' : 'Start your health journey today.';
            submitBtn.textContent = isLogin ? 'Login' : 'Sign Up';
            toggleAuthBtn.textContent = isLogin ? "Don't have an account? Sign up" : "Already have an account? Login";
        });

        submitBtn.addEventListener('click', async () => {
            const email = emailInput.value;
            const password = passwordInput.value;

            if (!email || !password) {
                alert("Please fill in all fields.");
                return;
            }

            try {
                if (isLogin) {
                    await signInWithEmailAndPassword(auth, email, password);
                } else {
                    await createUserWithEmailAndPassword(auth, email, password);
                }
                window.location.href = '/';
            } catch (error) {
                console.error("Auth error:", error);
                alert(error.message);
            }
        });
    </script>
</body>

</html>
