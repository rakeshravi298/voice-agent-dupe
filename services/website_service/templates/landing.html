<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>NutriBuddy | Secure Access</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1F2937;
            --accent: #10B981;
            --accent-hover: #059669;
            --bg-light: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border-color: #E5E7EB;
            --input-bg: #F9FAFB;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* Split Screen Layout */
        .hero-section {
            flex: 1;
            position: relative;
            display: none;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(0, 0, 0, 0)), url('/static/health_app_hero.png');
            background-size: cover;
            background-position: center;
        }

        @media (min-width: 1024px) {
            .hero-section {
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
                padding: 60px;
            }
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.2) 50%, rgba(0, 0, 0, 0) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 10;
            color: white;
            max-width: 500px;
        }

        .hero-title {
            font-size: 2.5rem;
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: 1rem;
        }

        .hero-subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
        }

        .auth-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: white;
            position: relative;
        }

        .auth-container {
            width: 100%;
            max-width: 420px;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.5rem; }
            .logo { font-size: 2rem; }
            .login-btn { padding: 14px; font-size: 1rem; }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand-logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 2rem;
            text-decoration: none;
        }

        .brand-icon {
            width: 36px;
            height: 36px;
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-header {
            margin-bottom: 2.5rem;
        }

        .auth-header h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .auth-header p {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .input-field {
            width: 100%;
            padding: 0.875rem 1rem;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent);
            background-color: white;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .input-field::placeholder {
            color: #9CA3AF;
        }

        .btn-primary {
            width: 100%;
            padding: 1rem;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 1rem;
        }

        .btn-primary:hover {
            background-color: #111827;
            transform: translateY(-1px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .toggle-auth {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .toggle-auth button {
            background: none;
            border: none;
            color: var(--accent);
            font-weight: 600;
            font-family: inherit;
            font-size: inherit;
            cursor: pointer;
            padding: 0 4px;
        }

        .toggle-auth button:hover {
            color: var(--accent-hover);
            text-decoration: underline;
        }

        .role-selector {
            display: none;
            margin-bottom: 1.5rem;
            animation: fadeIn 0.4s ease;
        }

        .role-selector label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.75rem;
        }

        .role-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .role-option {
            position: relative;
            display: flex;
            align-items: center;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--input-bg);
        }

        .role-option:hover {
            border-color: #D1D5DB;
        }

        .role-option input:checked+.role-label {
            color: var(--accent);
        }

        .role-option:has(input:checked) {
            border-color: var(--accent);
            background: rgba(16, 185, 129, 0.05);
        }

        .role-option input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .role-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            color: var(--primary);
            width: 100%;
        }

        .role-icon {
            color: inherit;
        }

        .footer-note {
            position: absolute;
            bottom: 2rem;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        /* SVG Icons */
        .icon {
            width: 20px;
            height: 20px;
            stroke-width: 2;
            fill: none;
            stroke: currentColor;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>

<body>
    <div class="hero-section">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-title">Elevate your nutrition practice with AI.</h1>
            <p class="hero-subtitle">NutriBuddy seamlessly connects dieticians with clients through an intelligent,
                empathetic voice assistant platform.</p>
        </div>
    </div>

    <div class="auth-section">
        <div class="auth-container">
            <a href="/" class="brand-logo">
                <img src="/static/logo.png" alt="NutriBuddy" width="36" height="36" style="border-radius: 8px;">
                NutriBuddy
            </a>

            <div class="auth-header">
                <h1 id="auth-title">Welcome back</h1>
                <p id="auth-subtitle">Please enter your details to sign in.</p>
            </div>

            <div class="auth-form">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="input-field" placeholder="Enter your email"
                        autocomplete="email">
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <div style="position: relative;">
                        <input type="password" id="password" class="input-field" placeholder="••••••••"
                            autocomplete="current-password" style="padding-right: 40px;">
                        <button type="button" id="togglePasswordBtn" title="Toggle password visibility" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--text-muted); padding: 0;">
                            <svg class="icon" viewBox="0 0 24 24" id="eyeIcon" style="width: 20px; height: 20px;">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="role-selector" id="role-selection">
                    <label>I am a:</label>
                    <div class="role-options">
                        <label class="role-option">
                            <input type="radio" name="role" value="user" checked>
                            <div class="role-label">
                                <svg class="icon role-icon" viewBox="0 0 24 24">
                                    <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
                                    <circle cx="12" cy="7" r="4" />
                                </svg>
                                Client
                            </div>
                        </label>
                        <label class="role-option">
                            <input type="radio" name="role" value="dietician">
                            <div class="role-label">
                                <svg class="icon role-icon" viewBox="0 0 24 24">
                                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                                    <path d="m9 12 2 2 4-4" />
                                </svg>
                                Dietician
                            </div>
                        </label>
                    </div>
                </div>

                <button class="btn-primary" id="submitBtn">Sign In</button>
            </div>


        </div>


    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        // CONFIG_PLACEHOLDER

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isLogin = true;

        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const submitBtn = document.getElementById('submitBtn');
        const authTitle = document.getElementById('auth-title');
        const authSubtitle = document.getElementById('auth-subtitle');

        submitBtn.addEventListener('click', async () => {
            const email = emailInput.value;
            const password = passwordInput.value;
            const role = document.querySelector('input[name="role"]:checked')?.value || 'user';

            if (!email || !password) {
                alert("Please fill in all fields.");
                return;
            }

            const originalText = submitBtn.textContent;
            submitBtn.disabled = true;
            submitBtn.textContent = 'Processing...';

            try {
                let userCredential;
                if (isLogin) {
                    userCredential = await signInWithEmailAndPassword(auth, email, password);
                } else {
                    userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    await setDoc(doc(db, "profiles", userCredential.user.uid), {
                        email: email,
                        role: role,
                        createdAt: new Date().toISOString()
                    });

                    const sanitizedEmail = email.replace("@", "_at_").replace(".", "_");
                    await setDoc(doc(db, "users", sanitizedEmail), { initialized: true });
                }

                // Check role and redirect
                const userDoc = await getDoc(doc(db, "profiles", userCredential.user.uid));
                if (userDoc.exists()) {
                    const userData = userDoc.data();
                    if (userData.role === 'dietician') {
                        window.location.href = '/dietician';
                    } else {
                        window.location.href = '/';
                    }
                } else {
                    window.location.href = '/';
                }
            } catch (error) {
                console.error("Auth error:", error);

                // Friendly error messages
                let msg = error.message;
                if (error.code === 'auth/invalid-credential') msg = "Invalid email or password.";
                if (error.code === 'auth/email-already-in-use') msg = "Email is already registered.";
                if (error.code === 'auth/weak-password') msg = "Password should be at least 6 characters.";

                alert(msg);
                submitBtn.disabled = false;
                submitBtn.textContent = originalText;
            }
        });

        // Allow pressing Enter to submit
        passwordInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                submitBtn.click();
            }
        });

        // Show/Hide Password
        const togglePasswordBtn = document.getElementById('togglePasswordBtn');
        const eyeIcon = document.getElementById('eyeIcon');
        togglePasswordBtn.addEventListener('click', () => {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.innerHTML = `
                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                    <line x1="1" y1="1" x2="23" y2="23"></line>
                `;
            } else {
                passwordInput.type = 'password';
                eyeIcon.innerHTML = `
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                    <circle cx="12" cy="12" r="3" />
                `;
            }
        });
    </script>
</body>

</html>
